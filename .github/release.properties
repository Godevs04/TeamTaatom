# GitHub internal release only — does NOT change app.json (App Store / Play Store).
# app.json version is for stores; change it manually when you release to stores.
# This file and the workflow only create GitHub tags/releases (internal reference).
#
# Internal version format: YEAR.MONTH.PATCH (e.g. 2026.1.1)
#   - First number (2026 or 26) = Year
#   - Second (1) = Month (1–12)
#   - Third (1) = Patch number for that month
#
# RELEASE_TYPE:
#   major        - New year: bump year, month=1, patch=1 (e.g. 2026.1.3 → 2027.1.1)
#   minor        - New month: bump month, patch=1 (e.g. 2026.1.2 → 2026.2.1)
#   patch        - Set patch for current year.month. Set PATCH_VERSION (1 → 2026.1.1, 2 → 2026.1.2).
#   service_pack - Increment patch. Label = "Service Patch 2026.1" (no patch no in label).
#
RELEASE_TYPE=patch

# LAST_INTERNAL_VERSION: Last GitHub internal version (used to compute next). Update after each release.
LAST_INTERNAL_VERSION=2026.03.4

# YEAR (optional). If not set, uses current year.
# YEAR=2026

# MONTH (optional). If not set, uses current month (1–12).
# MONTH=1

# PATCH_VERSION: For RELEASE_TYPE=patch, the patch number to set (1 → 2026.1.1, 2 → 2026.1.2).
PATCH_VERSION=5

# GitHub release tag prefix (e.g. Taatom_ → tag Taatom_2026.1.1). Leave empty for no prefix.
TAG_PREFIX=Taatom_

# ALLOW_REPATCH: Set to true to re-release the same version (e.g. after a failed build or to fix release notes).
# When true: uses LAST_INTERNAL_VERSION as release version (no bump). When false: new version must be greater
# than LAST_INTERNAL_VERSION (validation will fail if new version <= last).
ALLOW_REPATCH=false

# Optional: Custom label for release notes. For service_pack, auto-set to "Service Patch {year}.{month}" if empty.
# RELEASE_LABEL=
