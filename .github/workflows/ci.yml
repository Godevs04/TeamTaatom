# ─────────────────────────────────────────────────────────────────────────────
# CI — Unified pipeline (Frontend + Backend + Web), like a single test suite
# ─────────────────────────────────────────────────────────────────────────────
# • Runs when you change files under frontend/, backend/, or web/ (push or PR to main/develop).
# • Each job runs only if that folder changed (path-based = saves minutes).
# • Manual "Run workflow" runs all jobs.
# • Final "CI Success" job ties the graph together and shows what ran.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
    paths: ['frontend/**', 'web/**', 'backend/**']
  pull_request:
    branches: [main, develop]
    paths: ['frontend/**', 'web/**', 'backend/**']
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ─── Pre-job: detect which modules changed (drives the rest of the graph)
  changes:
    name: pre-job
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      web: ${{ steps.filter.outputs.web }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed folders
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            web:
              - 'web/**'
            backend:
              - 'backend/**'

      - name: Show what will run
        run: |
          echo "## 📋 CI plan (path-based)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.filter.outputs.frontend }}" = "true" ]; then
            echo "• **Frontend** — Will run (lint, build web)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "• **Frontend** — Skipped (no changes in \`frontend/\`)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.filter.outputs.web }}" = "true" ]; then
            echo "• **Web** — Will run (lint, typecheck, build)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "• **Web** — Skipped (no changes in \`web/\`)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.filter.outputs.backend }}" = "true" ]; then
            echo "• **Backend** — Will run (lint, test, coverage)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "• **Backend** — Skipped (no changes in \`backend/\`)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"

  # ─── Frontend: lint & build web (path-based)
  frontend:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 📌 Why this job ran
        run: |
          echo "## 📱 Frontend CI" >> "$GITHUB_STEP_SUMMARY"
          echo "Running because there are changes in \`frontend/\` (or you triggered the workflow manually)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: ./frontend
        run: npm run lint || echo "Lint not configured"

      - name: Build web
        working-directory: ./frontend
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL || secrets.EXPO_PUBLIC_API_BASE_URL || 'http://localhost:3000' }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN || secrets.EXPO_PUBLIC_SENTRY_DSN || '' }}
          EXPO_PUBLIC_SENTRY_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
        run: npm run build:web

      - name: Upload source maps to Sentry
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        working-directory: ./frontend
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          RELEASE_VERSION: ${{ github.sha }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_ORG" ] || [ -z "$SENTRY_PROJECT" ]; then
            echo "⚠️ Sentry secrets not set; skipping source maps upload."
            exit 0
          fi
          npm install -g @sentry/cli || true
          if [ -d "dist" ]; then
            sentry-cli sourcemaps upload --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" --release "$RELEASE_VERSION" dist/ || true
          fi

      - name: Upload web-build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/dist
          retention-days: 7

      - name: ✅ Frontend CI result
        run: |
          echo "## ✅ Frontend CI passed" >> "$GITHUB_STEP_SUMMARY"
          echo "Lint and build (web) completed successfully for \`frontend/\`." >> "$GITHUB_STEP_SUMMARY"

  # ─── Web: lint, typecheck & build (path-based)
  web:
    name: Lint & Build Web
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 📌 Why this job ran
        run: |
          echo "## 🌐 Web CI" >> "$GITHUB_STEP_SUMMARY"
          echo "Running because there are changes in \`web/\` (or manual run)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: ./web
        run: npm ci || npm install

      - name: Lint
        working-directory: ./web
        run: npm run lint

      - name: Typecheck
        working-directory: ./web
        run: npm run typecheck

      - name: Build
        working-directory: ./web
        env:
          NODE_ENV: production
        run: npm run build

      - name: ✅ Web CI result
        run: |
          echo "## ✅ Web CI passed" >> "$GITHUB_STEP_SUMMARY"
          echo "Lint, typecheck, and build completed successfully for \`web/\`." >> "$GITHUB_STEP_SUMMARY"

  # ─── Backend: lint & test (path-based)
  backend:
    name: Test & Lint Backend
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 📌 Why this job ran
        run: |
          echo "## ⚙️ Backend CI" >> "$GITHUB_STEP_SUMMARY"
          echo "Running because there are changes in \`backend/\` (or manual run)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint
        working-directory: ./backend
        run: npm run lint

      - name: Test
        working-directory: ./backend
        env:
          CI: true
        run: npm test

      - name: Test coverage
        working-directory: ./backend
        env:
          CI: true
        run: npm run test:coverage -- --ci --coverageReporters=text-summary

      - name: ✅ Backend CI result
        run: |
          echo "## ✅ Backend CI passed" >> "$GITHUB_STEP_SUMMARY"
          echo "Lint, tests, and coverage completed successfully for \`backend/\`." >> "$GITHUB_STEP_SUMMARY"

  # ─── Final job: ties the graph and shows overall success (like "End-to-End Tests Success")
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [changes, frontend, web, backend]
    if: always() && needs.changes.result == 'success'
    timeout-minutes: 1
    steps:
      - name: Summary
        run: |
          echo "## ✅ CI Success" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Module   | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | ${{ needs.frontend.result == 'success' && '✅ Passed' || (needs.frontend.result == 'skipped' && '⏭️ Skipped (no changes)') || '❌ Failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web      | ${{ needs.web.result == 'success' && '✅ Passed' || (needs.web.result == 'skipped' && '⏭️ Skipped (no changes)') || '❌ Failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend  | ${{ needs.backend.result == 'success' && '✅ Passed' || (needs.backend.result == 'skipped' && '⏭️ Skipped (no changes)') || '❌ Failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Unified CI (frontend + web + backend) finished. Only changed modules ran." >> "$GITHUB_STEP_SUMMARY"
