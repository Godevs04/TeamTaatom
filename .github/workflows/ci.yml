# ─────────────────────────────────────────────────────────────────────────────
# CI — Validate first, then path-based: Frontend + Web + Backend + SuperAdmin
# ─────────────────────────────────────────────────────────────────────────────
# • Validate runs FIRST (TAATOM commit/PR conventions). If it fails, nothing else runs.
# • On merge commits to main/develop, heavy jobs are skipped (CI already passed on the PR).
# • Path-based: only changed modules run. Manual "Run workflow" runs all.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'web/**'
      - 'backend/**'
      - 'SuperAdmin/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'web/**'
      - 'backend/**'
      - 'SuperAdmin/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate (PR / commit conventions)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      is_merge_commit: ${{ steps.merge_check.outputs.is_merge_commit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Enforce commit message & branch conventions
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            MSG="$PR_TITLE"
          elif [ "$EVENT_NAME" = "push" ] && [ -n "$HEAD_COMMIT_MESSAGE" ]; then
            MSG="$HEAD_COMMIT_MESSAGE"
            MSG=$(printf '%s\n' "$MSG" | head -n1)
          else
            MSG=$(git log -1 --pretty=%s 2>/dev/null || echo "TAATOM: workflow run")
          fi

          if [ "$EVENT_NAME" = "pull_request" ] && [ "$ACTOR" = "dependabot[bot]" ]; then
            echo "✅ Dependabot PR; validation skipped."
            exit 0
          fi
          if echo "$MSG" | grep -qi '\[skip validation\]'; then
            echo "✅ Bypass marker found; validation skipped."
            exit 0
          fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "✅ Manual run; validation skipped."
            exit 0
          fi
          if echo "$MSG" | grep -qE '^Merge (pull request|branch) '; then
            echo "✅ Merge commit; validation skipped."
            exit 0
          fi
          if echo "$MSG" | grep -qE '^TAATOM(-[0-9A-Za-z]+)?(\s|:)'; then
            echo "✅ Commit message OK: TAATOM or TAATOM-<id> prefix."
            exit 0
          fi
          echo "❌ Commit message must start with TAATOM or TAATOM-<id> followed by space or colon."
          echo "   Example: TAATOM: Add feature   or   TAATOM-42: Fix bug"
          echo "   Got (first line): $MSG"
          exit 1

      - name: Set merge-commit flag
        id: merge_check
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ "$EVENT_NAME" != "push" ]; then
            echo "is_merge_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          MSG=$(echo "$HEAD_COMMIT_MESSAGE" | head -n1)
          if echo "$MSG" | grep -qE '^Merge (pull request|branch) '; then
            echo "is_merge_commit=true" >> "$GITHUB_OUTPUT"
            echo "Merge commit — module jobs will be skipped."
          else
            echo "is_merge_commit=false" >> "$GITHUB_OUTPUT"
          fi

  changes:
    name: pre-job
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 2
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      web: ${{ steps.filter.outputs.web }}
      backend: ${{ steps.filter.outputs.backend }}
      superadmin: ${{ steps.filter.outputs.superadmin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed folders
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            web:
              - 'web/**'
            backend:
              - 'backend/**'
            superadmin:
              - 'SuperAdmin/**'

      - name: Show what will run
        run: |
          echo "## 📋 CI plan" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.validate.outputs.is_merge_commit }}" = "true" ]; then
            echo "🔄 **Merge commit** — module jobs skipped." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.filter.outputs.frontend }}" = "true" ]; then
            echo "• **frontend** — will run" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "• **frontend** — skipped (no changes)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.filter.outputs.web }}" = "true" ]; then
            echo "• **web** — will run" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "• **web** — skipped (no changes)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.filter.outputs.backend }}" = "true" ]; then
            echo "• **backend** — will run" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "• **backend** — skipped (no changes)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.filter.outputs.superadmin }}" = "true" ]; then
            echo "• **SuperAdmin** — will run" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "• **SuperAdmin** — skipped (no changes)" >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest
    needs: [validate, changes]
    if: (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true') && needs.validate.outputs.is_merge_commit != 'true'
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --include=dev || npm install --include=dev

      - name: Lint (typecheck)
        working-directory: ./frontend
        run: npm run lint

      - name: Build web
        working-directory: ./frontend
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL || secrets.EXPO_PUBLIC_API_BASE_URL || 'https://api.taatom.com' }}
          EXPO_PUBLIC_WEB_SHARE_URL: ${{ vars.EXPO_PUBLIC_WEB_SHARE_URL || secrets.EXPO_PUBLIC_WEB_SHARE_URL || 'https://taatom.com' }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN || secrets.EXPO_PUBLIC_SENTRY_DSN || '' }}
          EXPO_PUBLIC_SENTRY_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
        run: npm run build:web

      - name: Upload source maps to Sentry
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        working-directory: ./frontend
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          RELEASE_VERSION: ${{ github.sha }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_ORG" ] || [ -z "$SENTRY_PROJECT" ]; then
            echo "⚠️ Sentry secrets not set; skipping source maps upload."
            exit 0
          fi
          npm install -g @sentry/cli || true
          if [ -d "dist" ]; then
            sentry-cli sourcemaps upload --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" --release "$RELEASE_VERSION" dist/ || true
          fi

      - name: Upload web-build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/dist
          retention-days: 7

  web:
    name: Lint & Build Web
    runs-on: ubuntu-latest
    needs: [validate, changes]
    if: (github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true') && needs.validate.outputs.is_merge_commit != 'true'
    timeout-minutes: 20
    env:
      BACKEND_ORIGIN: ${{ vars.BACKEND_ORIGIN || 'https://api.taatom.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: ./web
        run: npm ci --include=dev || npm install --include=dev

      - name: Lint
        working-directory: ./web
        run: npm run lint

      - name: Typecheck
        working-directory: ./web
        run: npm run typecheck

      - name: Build
        working-directory: ./web
        env:
          NODE_ENV: production
        run: npm run build

  backend:
    name: Test & Lint Backend
    runs-on: ubuntu-latest
    needs: [validate, changes]
    if: (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true') && needs.validate.outputs.is_merge_commit != 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci --include=dev

      - name: Lint
        working-directory: ./backend
        run: npm run check

      - name: Test
        working-directory: ./backend
        env:
          CI: true
        run: npm test

      - name: Test coverage
        working-directory: ./backend
        env:
          CI: true
        run: npm run test:coverage -- --ci --coverageReporters=text-summary

  superadmin:
    name: Check & Build SuperAdmin
    runs-on: ubuntu-latest
    needs: [validate, changes]
    if: (github.event_name == 'workflow_dispatch' || needs.changes.outputs.superadmin == 'true') && needs.validate.outputs.is_merge_commit != 'true'
    timeout-minutes: 15
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.taatom.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: SuperAdmin/package-lock.json

      - name: Install dependencies
        working-directory: ./SuperAdmin
        run: npm ci --include=dev || npm install --include=dev

      - name: Check (typecheck + lint)
        working-directory: ./SuperAdmin
        run: npm run check

      - name: Build
        working-directory: ./SuperAdmin
        env:
          NODE_ENV: production
        run: npm run build

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [validate, changes, frontend, web, backend, superadmin]
    if: always()
    timeout-minutes: 1
    steps:
      - name: Verify results
        env:
          VALIDATE: ${{ needs.validate.result }}
          CHANGES: ${{ needs.changes.result }}
          FRONTEND: ${{ needs.frontend.result }}
          WEB: ${{ needs.web.result }}
          BACKEND: ${{ needs.backend.result }}
          SUPERADMIN: ${{ needs.superadmin.result }}
          IS_MERGE: ${{ needs.validate.outputs.is_merge_commit }}
        run: |
          status_icon() {
            case "$1" in
              success) echo "✅ Passed" ;;
              skipped) echo "⏭️ Skipped" ;;
              failure) echo "❌ Failed" ;;
              *) echo "⚠️ $1" ;;
            esac
          }

          fail=false
          if [ "$VALIDATE" != "success" ] || [ "$CHANGES" != "success" ]; then
            fail=true
          fi
          for result in "$FRONTEND" "$WEB" "$BACKEND" "$SUPERADMIN"; do
            if [ "$result" = "failure" ]; then
              fail=true
            fi
          done

          {
            echo "## CI Summary"
            echo ""
            echo "| Module | Status |"
            echo "|--------|--------|"
            echo "| Frontend | $(status_icon "$FRONTEND") |"
            echo "| Web | $(status_icon "$WEB") |"
            echo "| Backend | $(status_icon "$BACKEND") |"
            echo "| SuperAdmin | $(status_icon "$SUPERADMIN") |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$fail" = "true" ]; then
            echo "❌ CI failed — see job logs above."
            exit 1
          fi
          echo "✅ CI passed."
