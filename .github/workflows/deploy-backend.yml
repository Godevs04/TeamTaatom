# =============================================================================
# Deploy Taatom backend to AWS EC2 (Docker Compose + health check + rollback)
# Triggers on push to main when backend/ or this workflow changes.
#
# Server layout (EC2):
#   /home/ubuntu/taatom/TeamTaatom          ← git clone of monorepo
#   /home/ubuntu/taatom/TeamTaatom/backend  ← docker compose + .env
#
# SSH: store EC2_SSH_KEY as base64 of the PEM (avoids GitHub newline mangling).
#   base64 -i your-key.pem | pbcopy   # macOS
#   base64 -w0 your-key.pem           # Linux
# EC2_HOST must be the PUBLIC IPv4 / Elastic IP (not 172.31.x.x).
# =============================================================================

name: Deploy Backend (EC2)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy on EC2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH private key
        env:
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -z "${EC2_SSH_KEY_B64:-}" ]; then
            echo "ERROR: EC2_SSH_KEY secret is empty."
            exit 1
          fi

          # Accept either base64-encoded PEM (preferred) or raw PEM.
          if printf '%s' "$EC2_SSH_KEY_B64" | grep -q 'BEGIN .*PRIVATE KEY'; then
            printf '%s\n' "$EC2_SSH_KEY_B64" > ~/.ssh/ec2.pem
          else
            printf '%s' "$EC2_SSH_KEY_B64" | tr -d '\r\n ' | base64 -d > ~/.ssh/ec2.pem
          fi
          chmod 600 ~/.ssh/ec2.pem

          if ! ssh-keygen -y -f ~/.ssh/ec2.pem >/dev/null 2>&1; then
            echo "ERROR: EC2_SSH_KEY is not a valid private key."
            echo "Encode the PEM on your machine and update the secret:"
            echo "  macOS:  base64 -i your-key.pem | pbcopy"
            echo "  Linux:  base64 -w0 your-key.pem"
            exit 1
          fi
          echo "SSH private key OK"

      - name: Preflight — TCP reachability from Actions runner
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
        run: |
          set -euo pipefail
          HOST="$(printf '%s' "$EC2_HOST" | tr -d '[:space:]')"
          PORT="$(printf '%s' "${EC2_SSH_PORT:-22}" | tr -d '[:space:]')"
          if [ -z "$PORT" ]; then PORT=22; fi

          echo "Host length: ${#HOST}"
          echo "Port: $PORT"
          echo "Host prefix: ${HOST:0:3}..."

          case "$HOST" in
            10.*|192.168.*|172.1[6-9].*|172.2[0-9].*|172.3[0-1].*)
              echo "ERROR: EC2_HOST looks like a private RFC1918 address."
              echo "GitHub Actions cannot reach private IPs. Use the Public IPv4 / Elastic IP."
              exit 1
              ;;
          esac

          echo "Probing TCP ${HOST}:${PORT} from this runner..."
          if ! timeout 10 bash -c "echo >/dev/tcp/${HOST}/${PORT}"; then
            echo "ERROR: TCP connect timed out from GitHub Actions → ${HOST}:${PORT}"
            echo ""
            echo "Your Mac can reach the server, but Actions uses different source IPs."
            echo "Fix AWS Security Group inbound SSH (22):"
            echo "  Source must be 0.0.0.0/0  (NOT 'My IP' only)"
            echo "Also confirm EC2_HOST is exactly the public IP (no spaces/quotes)."
            exit 1
          fi
          echo "TCP reachability OK from Actions runner"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO_PATH: ${{ secrets.EC2_REPO_PATH }}
          BACKEND_PATH: ${{ secrets.EC2_BACKEND_PATH }}
          HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: /home/runner/.ssh/ec2.pem
          port: 22
          timeout: 60s
          envs: REPO_PATH,BACKEND_PATH,HEALTH_URL
          script_stop: false
          command_timeout: 25m
          script: |
            set -euo pipefail

            # Trim whitespace from secrets (trailing spaces break cd)
            REPO_PATH="$(printf '%s' "${REPO_PATH:-/home/ubuntu/taatom/TeamTaatom}" | tr -d '[:space:]')"
            BACKEND_PATH="$(printf '%s' "${BACKEND_PATH:-}" | tr -d '[:space:]')"
            HEALTH_URL="$(printf '%s' "${HEALTH_URL:-http://127.0.0.1:3000/health}" | tr -d '[:space:]')"

            if [ -z "$BACKEND_PATH" ]; then
              BACKEND_PATH="$REPO_PATH/backend"
            fi

            echo "REPO_PATH=$REPO_PATH"
            echo "BACKEND_PATH=$BACKEND_PATH"
            echo "HEALTH_URL=$HEALTH_URL"

            if [ ! -d "$REPO_PATH" ]; then
              echo "ERROR: REPO_PATH does not exist: [$REPO_PATH]"
              echo "Set EC2_REPO_PATH secret to: /home/ubuntu/taatom/TeamTaatom"
              ls -la /home/ubuntu/taatom || true
              exit 1
            fi

            cd "$REPO_PATH"

            echo "==> Recording rollback point"
            PREV_SHA="$(git rev-parse HEAD)"
            PREV_IMAGE_ID="$(docker images -q taatom-backend:latest 2>/dev/null || true)"
            if [ -n "$PREV_IMAGE_ID" ]; then
              docker tag taatom-backend:latest "taatom-backend:rollback-${PREV_SHA}" || true
            fi

            echo "==> Fetching latest main"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            if [ ! -d "$BACKEND_PATH" ]; then
              echo "ERROR: BACKEND_PATH does not exist: [$BACKEND_PATH]"
              echo "Set EC2_BACKEND_PATH secret to: /home/ubuntu/taatom/TeamTaatom/backend"
              echo "Contents of repo root:"
              ls -la "$REPO_PATH"
              exit 1
            fi

            cd "$BACKEND_PATH"

            if [ ! -f .env ]; then
              echo "ERROR: $BACKEND_PATH/.env is missing. Create it from .env.example before deploying."
              exit 1
            fi

            echo "==> Building image"
            docker compose build

            echo "==> Restarting stack"
            docker compose up -d --remove-orphans

            echo "==> Waiting for health: $HEALTH_URL"
            OK=0
            for i in $(seq 1 30); do
              if curl -fsS "$HEALTH_URL" >/dev/null 2>&1; then
                OK=1
                break
              fi
              echo "  attempt $i/30 — not ready yet"
              sleep 5
            done

            if [ "$OK" -ne 1 ]; then
              echo "==> Health check FAILED — rolling back to $PREV_SHA"
              cd "$REPO_PATH"
              git reset --hard "$PREV_SHA"
              cd "$BACKEND_PATH"
              if docker image inspect "taatom-backend:rollback-${PREV_SHA}" >/dev/null 2>&1; then
                docker tag "taatom-backend:rollback-${PREV_SHA}" taatom-backend:latest
                docker compose up -d --no-build --remove-orphans
              else
                docker compose up -d --build --remove-orphans
              fi

              sleep 10
              if curl -fsS "$HEALTH_URL" >/dev/null 2>&1; then
                echo "Rollback container is healthy; failing the workflow."
              else
                echo "CRITICAL: rollback health check also failed. Manual intervention required."
              fi
              exit 1
            fi

            echo "==> Deploy healthy"
            curl -fsS "$HEALTH_URL" || true
            docker compose ps
            docker image prune -f >/dev/null 2>&1 || true
