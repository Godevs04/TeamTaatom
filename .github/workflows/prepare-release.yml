# ─────────────────────────────────────────────────────────────────────────────
# Prepare Release — Internal GitHub release (does NOT change app.json / stores)
# ─────────────────────────────────────────────────────────────────────────────
#
# Manual only: Actions → "Prepare Release" → "Run workflow"
#
# Flow:
#   1. verify  — lint/check/build all apps (frontend, web, backend, SuperAdmin)
#   2. bump    — compute internal version from .github/release.properties
#   3. release — create GitHub tag + release (no push to main)
#
# app.json is for App Store / Play Store — update that manually for store releases.
# After each run, update LAST_INTERNAL_VERSION in .github/release.properties via PR.
# ─────────────────────────────────────────────────────────────────────────────

name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Override RELEASE_TYPE (patch|minor|major|service_pack)'
        required: false
      patch_version:
        description: 'For patch type: patch number to set (1 → 2026.1.1, 2 → 2026.1.2)'
        required: false
        default: ''
      allow_repatch:
        description: 'Re-release same version (e.g. after failure). Overrides ALLOW_REPATCH in properties.'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20.x'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    name: Verify all apps
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BACKEND_ORIGIN: ${{ vars.BACKEND_ORIGIN || 'https://api.taatom.com' }}
      VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.taatom.com' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Frontend — lint & build web
        working-directory: ./frontend
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL || secrets.EXPO_PUBLIC_API_BASE_URL || 'https://api.taatom.com' }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN || secrets.EXPO_PUBLIC_SENTRY_DSN || '' }}
          EXPO_PUBLIC_SENTRY_ENVIRONMENT: production
        run: |
          npm ci --include=dev || npm install --include=dev
          npm run lint
          npm run build:web

      - name: Web — lint, typecheck & build
        working-directory: ./web
        env:
          NODE_ENV: production
        run: |
          npm ci --include=dev || npm install --include=dev
          npm run lint
          npm run typecheck
          npm run build

      - name: Backend — check & test
        working-directory: ./backend
        env:
          CI: true
        run: |
          npm ci --include=dev
          npm run check
          npm test

      - name: SuperAdmin — check & build
        working-directory: ./SuperAdmin
        env:
          NODE_ENV: production
        run: |
          npm ci --include=dev || npm install --include=dev
          npm run check
          npm run build

      - name: Summary
        run: |
          {
            echo "## ✅ Pre-release verification passed"
            echo "Frontend, web, backend, and SuperAdmin all passed lint/check and build."
          } >> "$GITHUB_STEP_SUMMARY"

  bump_version:
    name: Bump internal version
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 5
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply workflow inputs to release.properties
        run: |
          PROP=.github/release.properties
          if [ -n "${{ github.event.inputs.release_type }}" ]; then
            sed -i.bak "s/^RELEASE_TYPE=.*/RELEASE_TYPE=${{ github.event.inputs.release_type }}/" "$PROP" && rm -f "${PROP}.bak"
          fi
          if [ -n "${{ github.event.inputs.patch_version }}" ]; then
            if grep -q '^PATCH_VERSION=' "$PROP"; then
              sed -i.bak "s/^PATCH_VERSION=.*/PATCH_VERSION=${{ github.event.inputs.patch_version }}/" "$PROP" && rm -f "${PROP}.bak"
            else
              echo "PATCH_VERSION=${{ github.event.inputs.patch_version }}" >> "$PROP"
            fi
          fi
          if [ "${{ github.event.inputs.allow_repatch }}" = "true" ]; then
            if grep -q '^ALLOW_REPATCH=' "$PROP"; then
              sed -i.bak "s/^ALLOW_REPATCH=.*/ALLOW_REPATCH=true/" "$PROP" && rm -f "${PROP}.bak"
            else
              echo "ALLOW_REPATCH=true" >> "$PROP"
            fi
          fi
          echo "Release config:"
          grep -E '^RELEASE_TYPE=|^PATCH_VERSION=|^ALLOW_REPATCH=|^YEAR=|^MONTH=' "$PROP" 2>/dev/null || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Compute next version and tag
        id: bump
        run: |
          node .github/scripts/bump-version.js
          NEW_VERSION=$(cat NEW_VERSION.txt)
          RELEASE_TAG=$(cat RELEASE_TAG.txt)
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "✅ Internal version: $NEW_VERSION → tag $RELEASE_TAG"
          echo "**New version:** \`$NEW_VERSION\` → **tag:** \`$RELEASE_TAG\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: |
            NEW_VERSION.txt
            RELEASE_LABEL.txt
            RELEASE_TAG.txt
            .github/release.properties

  prepare_release:
    name: Create GitHub tag & release
    runs-on: ubuntu-latest
    needs: bump_version
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download version artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-files
          path: ./release

      - name: Read release tag and version
        id: version
        run: |
          TAG=$(cat ./release/RELEASE_TAG.txt)
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$(cat ./release/NEW_VERSION.txt)" >> "$GITHUB_OUTPUT"

      - name: Set Git identity
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Create and push GitHub tag
        run: |
          TAG="${{ env.TAG }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping push"
          else
            git tag -a "$TAG" -m "Release $TAG (internal)"
            git push origin "$TAG"
            echo "✅ Pushed tag: $TAG"
          fi

      - name: Build release notes body
        id: release_body
        run: |
          if [ -f ./release/RELEASE_LABEL.txt ]; then
            LABEL=$(cat ./release/RELEASE_LABEL.txt)
            [ -n "$LABEL" ] && echo "body=**$LABEL**" >> "$GITHUB_OUTPUT" || echo "body=" >> "$GITHUB_OUTPUT"
          else
            echo "body=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body: ${{ steps.release_body.outputs.body }}
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Complete
        run: |
          {
            echo "## ✅ Prepare Release — Complete"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| **GitHub tag** | \`${{ env.TAG }}\` |"
            echo "| **Branch** | ${{ github.ref_name }} |"
            echo ""
            echo "**app.json** was not changed. Update \`LAST_INTERNAL_VERSION\` in \`.github/release.properties\` via PR after this release."
          } >> "$GITHUB_STEP_SUMMARY"
