# =============================================================================
# Nginx reverse proxy for Taatom backend on AWS EC2
# Place on host: /etc/nginx/sites-available/taatom-api
# Upstream: Docker Compose binds backend to 127.0.0.1:3000
#
# IMPORTANT: Only enable THIS file for api.taatom.com.
# Do NOT leave default.save / old Certbot site configs in sites-enabled
# (they steal the server_name and return 404).
#
# Cloudflare: Full or Full (strict) once origin has this 443 block.
# =============================================================================

upstream taatom_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP — ACME / redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.taatom.com;

    # Let's Encrypt renewals
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to Docker backend (certs from Certbot)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.taatom.com;

    ssl_certificate     /etc/letsencrypt/live/api.taatom.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.taatom.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 512m;
    client_body_timeout 120s;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /health {
        proxy_pass http://taatom_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        access_log off;
    }

    location /socket.io/ {
        proxy_pass http://taatom_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://taatom_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 7200s;
        proxy_read_timeout 7200s;
    }
}
