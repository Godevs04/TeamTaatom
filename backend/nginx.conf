# =============================================================================
# Nginx reverse proxy for Taatom backend on AWS EC2
# Place on host: /etc/nginx/sites-available/taatom-api
# Upstream: Docker Compose binds backend to 127.0.0.1:3000
#
# DNS: Cloudflare A/AAAA → EC2 public IP (proxied or DNS-only)
# TLS options:
#   A) Cloudflare Flexible / Full — terminate at Cloudflare; Nginx listens :80
#   B) Full (strict) — also terminate on EC2 (uncomment SSL server block + certs)
# =============================================================================

upstream taatom_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirect HTTP → HTTPS when certificates are installed on this host.
# With Cloudflare Flexible (HTTP to origin), keep only the :80 server and
# do not force a local redirect loop.
server {
    listen 80;
    listen [::]:80;
    server_name api.taatom.com;

    # Uncomment if origin should redirect to HTTPS (Cloudflare Full / Full strict
    # with certs on this box, or DNS-only + Let's Encrypt):
    # return 301 https://$host$request_uri;

    # --- Shared proxy settings (also mirrored in SSL server) ---
    client_max_body_size 512m;
    client_body_timeout 120s;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    # Enable HSTS only when HTTPS is correctly served end-to-end:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /health {
        proxy_pass http://taatom_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        access_log off;
    }

    # Socket.IO (path default /socket.io — override via WS_PATH if changed)
    location /socket.io/ {
        proxy_pass http://taatom_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://taatom_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 7200s;
        proxy_read_timeout 7200s;
    }
}

